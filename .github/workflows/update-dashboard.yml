name: Auto-Update Dashboard

on:
  schedule:
    # Every Monday at 7:00 AM UTC
    - cron: '0 7 * * 1'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual run'
        required: false
        default: 'Manual trigger'

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout dashboard repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pymongo dnspython

      - name: Generate updated dashboard
        env:
          MONGO_URL: ${{ secrets.MONGO_URL }}
          DB_NAME: ${{ secrets.DB_NAME || 'workya_db' }}
          DASHBOARD_PATH: index.html
        run: python scripts/generate_dashboard.py

      - name: Commit and push if data changed
        run: |
          git config user.name "WorkYa Bot"
          git config user.email "noreply@work-ya.com"
          if ! git diff --quiet index.html; then
            git add index.html
            git commit -m "Auto-update dashboard $(date -u '+%Y-%m-%d')"
            git push
            echo "Dashboard committed and pushed."
          else
            echo "No changes detected, skipping commit."
          fi
